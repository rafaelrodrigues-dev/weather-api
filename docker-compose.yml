services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_weather_data:/var/lib/postgresql/data
    networks:
      - weather_network

  web:
    build:
      context: .
    ports:
      - "5000:5000"
    volumes:
      - ./src:/app/src
    depends_on:
      - db
    env_file:
      - ./.env
    networks:
      - weather_network
    command: ["python", "src/weather_api/run.py"]

volumes:
  db_weather_data:

networks:
  weather_network: