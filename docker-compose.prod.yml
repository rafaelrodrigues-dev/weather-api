services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_weather_data:/var/lib/postgresql/data
    networks:
      - weather_network

  web:
    image: rafaelrodriguess/weather-api:latest
    ports:
      - "5000:5000"
    depends_on:
      - db
    env_file:
      - ./.env
    networks:
      - weather_network

volumes:
  db_weather_data:

networks:
  weather_network: